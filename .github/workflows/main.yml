name: Build lsplant-standalone aar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false  # 关键：不拉子模块

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: 1.12.1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Remove Android bundled CMake
        run: rm -rf "$ANDROID_HOME/cmake" || true

      - name: Grant execute permission
        run: chmod +x ./gradlew

      # 关键：只编译 lsplant 模块，不跑 test，不触发子模块拉取
      - name: Build standalone aar
        run: ./gradlew :lsplant:assembleStandalone -x test -x check --stacktrace

      - name: Upload aar
        uses: actions/upload-artifact@v4
        with:
          name: lsplant-standalone-aar
          path: lsplant/build/outputs/aar/*.aar
