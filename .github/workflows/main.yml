name: Build lsplant-standalone aar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Init required submodules only
        run: |
          git submodule sync -- lsplant/src/main/jni/external/dex_builder
          git submodule update --init --depth 1 lsplant/src/main/jni/external/dex_builder
          git -C lsplant/src/main/jni/external/dex_builder submodule sync --recursive
          git -C lsplant/src/main/jni/external/dex_builder submodule update --init --recursive --depth 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4
        with:
          version: 1.12.1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Remove Android bundled CMake
        run: rm -rf "$ANDROID_HOME/cmake" || true

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Debug submodules
        run: |
          ls -la lsplant/src/main/jni/external
          ls -la lsplant/src/main/jni/external/dex_builder
          ls -la lsplant/src/main/jni/external/dex_builder/external || true
          ls -la lsplant/src/main/jni/external/dex_builder/external/parallel_hashmap || true

      - name: Build standalone aar
        run: ./gradlew :lsplant:assembleStandalone -x test -x check --stacktrace --no-daemon

      - name: Upload aar
        uses: actions/upload-artifact@v4
        with:
          name: lsplant-standalone-aar
          path: lsplant/build/outputs/aar/*.aar
